name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build irish
        run: nix build .#irish

      - name: Smoke test
        run: |
          ./result/bin/irish -e 'ls | head 3 | print'
          ./result/bin/irish -e 'ps | head 1 | print'
          ./result/bin/irish -e '@base.types | print'

      - name: Build tests
        run: nix build .#iris-tests

      - name: Run tests
        run: ./result/bin/iris_tests --gtest_color=yes
